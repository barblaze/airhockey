<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Air Hockey Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#04060f;overflow:hidden;width:100vw;height:100vh;font-family:'Courier New',monospace;touch-action:none;user-select:none;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
canvas{position:fixed;inset:0;display:block;width:100%;height:100%;}
.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;background:radial-gradient(ellipse at center,#0a0e1f 0%,#04060f 100%);z-index:10;padding:20px;text-align:center;}
h1{color:#0ff;text-shadow:0 0 10px #0ff;font-size:38px;margin-bottom:15px;letter-spacing:4px;animation:pu 2s infinite;}
h2{color:#f0f;text-shadow:0 0 8px #f0f;font-size:24px;margin-bottom:10px;}
.btn{background:transparent;border:2px solid #0ff;color:#0ff;padding:14px 28px;font-size:18px;text-transform:uppercase;cursor:pointer;box-shadow:0 0 10px #0ff;transition:0.2s;min-width:220px;font-weight:bold;}
.btn:active{background:#0ff;color:#000;}
.btn.sec{border-color:#f0f;color:#f0f;box-shadow:0 0 10px #f0f;}
.btn.sec:active{background:#f0f;color:#000;}
#sH{color:#0f0;text-shadow:0 0 5px #0f0;font-size:14px;margin-top:10px;opacity:0.8;}
@keyframes pu{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.h{display:none !important;}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="sM" class="scr">
  <h1>AIR HOCKEY</h1>
  <button class="btn" id="b2P">2 JUGADORES</button>
  <button class="btn sec" id="bCPU">VS CPU</button>
  <div id="sH"></div>
</div>

<div id="sD" class="scr h">
  <h2>DIFICULTAD</h2>
  <button class="btn d-b" id="dE">FÁCIL</button>
  <button class="btn d-b" id="dM">NORMAL</button>
  <button class="btn d-b" id="dH">DIFÍCIL</button>
  <button class="btn sec" id="bBk">ATRÁS</button>
</div>

<div id="sTr" class="scr h">
  <h2 id="tT">TORNEO</h2>
  <p style="color:#fff;margin-bottom:10px;" id="tS"></p>
  <button class="btn" id="bNx">SIGUIENTE</button>
  <button class="btn sec" id="bSM">ABANDONAR</button>
</div>

<script>
// --- CONFIGURACIÓN DE RENDIMIENTO (EL "FIX") ---
const OPT = {
  maxDPR: window.devicePixelRatio > 1 ? 2 : 1, // No exceder 2x para evitar lag en 4K
  shadowLimit: 12 // Cap de sombras para que no tiemble el procesador
};

var CV=document.getElementById('cv'), X=CV.getContext('2d', {alpha: false}), W, H, DPR;

function rsz(){
  DPR = OPT.maxDPR;
  W = window.innerWidth;
  H = window.innerHeight;
  CV.width = W * DPR;
  CV.height = H * DPR;
  X.scale(DPR, DPR);
  if(window.G){ G.W=W; G.H=H; }
}
window.addEventListener('resize',rsz); rsz();

// --- AUDIO (Optimizado para no bloquear) ---
var AC,mG;
function gAC(){
  if(!AC){
    AC=new (window.AudioContext||window.webkitAudioContext)();
    mG=AC.createGain(); mG.connect(AC.destination);
  }
  if(AC.state==='suspended')AC.resume();
}
function pN(f,d,v,t){
  if(!AC)return;
  var o=AC.createOscillator(),g=AC.createGain();
  o.type=t||'sine'; o.frequency.setValueAtTime(f,AC.currentTime);
  g.gain.setValueAtTime(v,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01,AC.currentTime+d);
  o.connect(g); g.connect(mG); o.start(); o.stop(AC.currentTime+d);
}

// --- DIBUJO OPTIMIZADO (Sin el lag de sombras pesadas) ---
function nC(x,y,r,c,gl,in2){
  X.save();
  if(gl > 0){
    X.shadowBlur = Math.min(gl, OPT.shadowLimit);
    X.shadowColor = c;
  }
  X.fillStyle = c;
  X.beginPath();
  X.arc(x,y,r,0,Math.PI*2);
  X.fill();
  if(in2){
    X.shadowBlur = 0;
    X.fillStyle = in2;
    X.beginPath(); X.arc(x,y,r*.4,0,Math.PI*2); X.fill();
  }
  X.restore();
}

// --- CLASES Y LÓGICA (Tu código original integrado) ---
class PAD {
  constructor(x,y,c,id){
    this.x=x;this.y=y;this.r=28;this.c=c;this.id=id;
    this.lx=x;this.ly=y;this.vx=0;this.vy=0;
  }
  upd(){
    this.vx=(this.x-this.lx)*0.8; this.vy=(this.y-this.ly)*0.8;
    this.lx=this.x; this.ly=this.y;
  }
  drw(){ nC(this.x,this.y,this.r,this.c,18,'#fff'); }
}

class PRB {
  constructor(x,y){
    this.x=x;this.y=y;this.r=18;this.vx=0;this.vy=0;
  }
  upd(){
    this.x+=this.vx; this.y+=this.vy;
    this.vx*=0.992; this.vy*=0.992;
    if(this.x-this.r<0){this.x=this.r;this.vx*=-0.8;pN(150,0.1,0.2);}
    if(this.x+this.r>W){this.x=W-this.r;this.vx*=-0.8;pN(150,0.1,0.2);}
    if(this.y-this.r<0){
      if(this.x>W*0.3&&this.x<W*0.7){ goal(2); }
      else{this.y=this.r;this.vy*=-0.8;pN(150,0.1,0.2);}
    }
    if(this.y+this.r>H){
      if(this.x>W*0.3&&this.x<W*0.7){ goal(1); }
      else{this.y=H-this.r;this.vy*=-0.8;pN(150,0.1,0.2);}
    }
  }
  drw(){ nC(this.x,this.y,this.r,'#fff',15); }
}

var G, TR={on:false,mode:'2p',diff:'medium',bo:3,w:{p1:0,p2:0}};

function startGame(m,d){
  gAC();
  G={
    p1:new PAD(W/2,H-80,'#0ff','p1'),
    p2:new PAD(W/2,80,'#f0f','p2'),
    b:new PRB(W/2,H/2),
    s1:0,s2:0,m:m,d:d||'medium',pause:false,W:W,H:H
  };
  showScr('game');
}

function goal(p){
  pN(60,0.4,0.5,'square');
  if(p==1)G.s1++; else G.s2++;
  G.b.x=W/2; G.b.y=H/2; G.b.vx=0; G.b.vy=0;
}

// --- BUCLE PRINCIPAL ---
function loop(){
  X.fillStyle='#04060f';
  X.fillRect(0,0,W,H);
  
  // Dibujar Campo
  X.strokeStyle='rgba(0,255,255,0.2)'; X.lineWidth=4;
  X.beginPath(); X.moveTo(0,H/2); X.lineTo(W,H/2); X.stroke();
  X.beginPath(); X.arc(W/2,H/2,50,0,Math.PI*2); X.stroke();
  
  if(G && !G.pause){
    G.p1.upd(); G.p2.upd(); G.b.upd();
    
    // IA Simple para CPU
    if(G.m==='cpu'){
      let spd = G.d==='easy'?3:G.d==='medium'?5:8;
      G.p2.x += (G.b.x - G.p2.x)*0.1*spd;
      G.p2.y += (40 - G.p2.y)*0.1*spd;
    }

    // Colisiones
    [G.p1,G.p2].forEach(p=>{
      let dx=G.b.x-p.x, dy=G.b.y-p.y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<G.b.r+p.r){
        let ang=Math.atan2(dy,dx);
        G.b.vx+=Math.cos(ang)*8; G.b.vy+=Math.sin(ang)*8;
        pN(300,0.1,0.3);
      }
    });

    G.p1.drw(); G.p2.drw(); G.b.drw();
    
    // Marcador
    X.fillStyle='#fff'; X.font='bold 30px Courier New';
    X.fillText(G.s1, 20, H/2+40);
    X.fillText(G.s2, 20, H/2-20);
  }
  requestAnimationFrame(loop);
}

// --- CONTROLES (FIX DE TEMBLOR) ---
CV.addEventListener('touchstart',e=>{
  e.preventDefault();
  gAC();
  Array.from(e.changedTouches).forEach(t=>{
    if(t.clientY > H/2) G.p1.tid = t.identifier;
    else if(G.m==='2p') G.p2.tid = t.identifier;
  });
},{passive:false});

CV.addEventListener('touchmove',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{
    if(G.p1.tid===t.identifier){ G.p1.x=t.clientX; G.p1.y=Math.max(H/2+30,t.clientY); }
    if(G.p2.tid===t.identifier){ G.p2.x=t.clientX; G.p2.y=Math.min(H/2-30,t.clientY); }
  });
},{passive:false});

function showScr(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.add('h'));
  if(id!=='game') document.getElementById(id).classList.remove('h');
}

document.getElementById('b2P').onclick=()=>startGame('2p');
document.getElementById('bCPU').onclick=()=>showScr('sD');
document.getElementById('bBk').onclick=()=>showScr('sM');
document.querySelectorAll('.d-b').forEach(b=>{
  b.onclick=()=>startGame('cpu', b.id==='dE'?'easy':b.id==='dM'?'medium':'hard');
});

requestAnimationFrame(loop);
</script>
</body>
</html>
