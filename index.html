<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Air Hockey Pro</title>
<style>
  /* Mantenemos tu CSS original intacto */
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#04060f;overflow:hidden;width:100vw;height:100vh;font-family:'Courier New',monospace;touch-action:none;user-select:none;}
  canvas{position:fixed;inset:0;display:block;width:100%;height:100%;}
  .scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;background:radial-gradient(ellipse at center,#0a0e1f 0%,#04060f 100%);z-index:10;padding:20px;text-align:center;}
  .hid{display:none !important;}
  .btn{background:transparent;border:2px solid #0ff;color:#0ff;padding:14px 28px;font-size:18px;text-transform:uppercase;cursor:pointer;box-shadow:0 0 10px #0ff;transition:0.2s;min-width:220px;font-weight:bold;margin:5px;}
  .btn:active{background:#0ff;color:#000;}
  .btn.sec{border-color:#f0f;color:#f0f;box-shadow:0 0 10px #f0f;}
  h1{color:#0ff;text-shadow:0 0 10px #0ff;font-size:38px;margin-bottom:15px;letter-spacing:4px;}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="sM" class="scr">
  <h1>AIR HOCKEY</h1>
  <button class="btn" onclick="startGame('2p')">2 JUGADORES</button>
  <button class="btn sec" onclick="showScr('sD')">VS CPU</button>
</div>

<div id="sD" class="scr hid">
  <h2 style="color:#f0f">DIFICULTAD</h2>
  <button class="btn" onclick="startGame('cpu','easy')">FÁCIL</button>
  <button class="btn" onclick="startGame('cpu','medium')">NORMAL</button>
  <button class="btn" onclick="startGame('cpu','hard')">DIFÍCIL</button>
  <button class="btn sec" onclick="showScr('sM')">VOLVER</button>
</div>

<script>
// --- CONFIGURACIÓN DE RENDIMIENTO ---
var CV = document.getElementById('cv'), 
    X = CV.getContext('2d', { alpha: false }), 
    W, H, DPR;

function rsz() {
    // Limitamos a 2 para que no sea lento en móviles 4K
    DPR = Math.min(window.devicePixelRatio || 1, 2); 
    W = window.innerWidth;
    H = window.innerHeight;
    
    CV.width = W * DPR;
    CV.height = H * DPR;
    CV.style.width = W + 'px';
    CV.style.height = H + 'px';
    
    X.scale(DPR, DPR); // Esto hace que el dibujo sea nítido
}
window.addEventListener('resize', rsz);
rsz();

// --- CORRECCIÓN DE BOTONES (CLICK/TOUCH) ---
// Usamos onclick directamente en el HTML o addEventListener normal. 
// El problema anterior era que el touch-start bloqueaba el click.
function showScr(id) {
    document.querySelectorAll('.scr').forEach(s => s.classList.add('hid'));
    document.getElementById(id).classList.remove('hid');
}

// --- AUDIO OPTIMIZADO ---
var AC;
function gAC() {
    if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();
}

// --- DIBUJO OPTIMIZADO ---
function nC(x, y, r, c, gl, in2) {
    X.save();
    if (gl > 0) {
        X.shadowBlur = Math.min(gl, 12); // Límite de brillo para fluidez
        X.shadowColor = c;
    }
    X.fillStyle = c;
    X.beginPath();
    X.arc(x, y, r, 0, Math.PI * 2);
    X.fill();
    if (in2) {
        X.shadowBlur = 0;
        X.fillStyle = in2;
        X.beginPath();
        X.arc(x, y, r * 0.4, 0, Math.PI * 2);
        X.fill();
    }
    X.restore();
}

// --- LÓGICA DE JUEGO (REDUCIDA PARA EL EJEMPLO, MANTÉN LA TUYA) ---
var G = null;
function startGame(m, d) {
    gAC();
    G = { mode: m, diff: d, p1: {x:W/2, y:H-80, r:28}, p2: {x:W/2, y:80, r:28}, b: {x:W/2, y:H/2, vx:0, vy:0, r:18}, s1:0, s2:0 };
    showScr('game_active'); // Aquí ocultas los menús
}

// --- PREVENCIÓN DE TEMBLOR (BLOQUEO DE SCROLL) ---
CV.addEventListener('touchstart', (e) => {
    if(G) e.preventDefault(); 
}, { passive: false });

CV.addEventListener('touchmove', (e) => {
    if(G) {
        e.preventDefault();
        var t = e.touches[0];
        // Aquí va tu lógica de movimiento de paletas...
    }
}, { passive: false });

// BUCLE DE ANIMACIÓN
function loop() {
    X.fillStyle = '#04060f';
    X.fillRect(0, 0, W, H);
    
    if(G) {
        // Tu lógica de colisiones y dibujo aquí...
        nC(G.b.x, G.b.y, G.b.r, '#fff', 15);
        nC(G.p1.x, G.p1.y, G.p1.r, '#0ff', 20, '#fff');
    }
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
