<title>Air Hockey</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#04060f;overflow:hidden;width:100vw;height:100vh;font-family:'Courier New',monospace;touch-action:none;user-select:none;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
canvas{position:fixed;top:env(safe-area-inset-top,0px);left:env(safe-area-inset-left,0px);right:env(safe-area-inset-right,0px);bottom:env(safe-area-inset-bottom,0px);width:calc(100% - env(safe-area-inset-left,0px) - env(safe-area-inset-right,0px));height:calc(100% - env(safe-area-inset-top,0px) - env(safe-area-inset-bottom,0px));}
.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;background:radial-gradient(ellipse at center,#08082a,#04060f);overflow-y:auto;padding:18px 0;z-index:10;}

<body>
<canvas id="cv"></canvas>
<script>
window.addEventListener('DOMContentLoaded',function(){
// MEJORA 1: Optimización de resolución (DPR) sin romper la escala
var CV=document.getElementById('cv'),
    X=CV.getContext('2d', {alpha: false}), // Mejora rendimiento de GPU
    W,H;

function rsz(){
    // Limitamos el DPR a 2 para evitar el lag extremo en pantallas 4K móviles
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var wW = window.innerWidth;
    var wH = window.innerHeight;
    CV.width = wW * dpr;
    CV.height = wH * dpr;
    X.scale(dpr, dpr); // Esto mantiene tus coordenadas originales (W, H)
    W = wW; 
    H = wH;
    if(G){G.W=W;G.H=H;}
}
window.addEventListener('resize',rsz);rsz();

// --- TODAS TUS VARIABLES ORIGINALES (PAD, PRB, AIC, PC, etc.) ---
// [AQUÍ VA TODO TU CÓDIGO ORIGINAL SIN CAMBIOS]

// MEJORA 2: Límite de sombras en nC para fluidez
function nC(x,y,r,c,gl,in2){
    X.save();
    if(gl){
        // Ponemos un techo al brillo para que la GPU no sufra en GitHub Pages
        X.shadowBlur = Math.min(gl, 15);
        X.shadowColor = c;
    }
    X.fillStyle = c;
    X.beginPath();
    X.arc(x,y,r,0,Math.PI*2);
    X.fill();
    if(in2){
        X.shadowBlur=0;
        X.fillStyle=in2;
        X.beginPath();
        X.arc(x,y,r*.42,0,Math.PI*2);
        X.fill();
        X.strokeStyle=c+'99';
        X.lineWidth=1.5;
        X.beginPath();
        X.arc(x,y,r*.68,0,Math.PI*2);
        X.stroke();
    }
    X.restore();
}

// --- TODA TU LÓGICA DE AUDIO, PARTÍCULAS, IA Y COLISIONES ORIGINAL ---
// [AQUÍ VA TODO TU CÓDIGO ORIGINAL SIN CAMBIOS]

// MEJORA 3: Fix de temblor en eventos Touch
// Busca tus event listeners al final y asegúrate de que tengan {passive: false}
CV.addEventListener('touchstart',function(e){
    // Esto evita que la página de GitHub Pages se mueva mientras juegas
    if(e.target == CV) e.preventDefault(); 
    gAC(); 
    // ... tu lógica original de toques ...
}, {passive: false});

CV.addEventListener('touchmove',function(e){
    if(e.target == CV) e.preventDefault(); 
    // ... tu lógica original de movimiento ...
}, {passive: false});

// --- EL RESTO DE TU CÓDIGO (Torneos, VisibilityChange, Android Back, etc.) ---

});
